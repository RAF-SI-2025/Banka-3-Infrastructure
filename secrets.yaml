# ExternalSecrets for raf-banka.
# Sync wave -10 — materialize before any Deployment (wave 0) mounts them.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: banka-auth
  namespace: raf-banka
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: banka-auth
    creationPolicy: Owner
  data:
    - secretKey: jwt-signing-key
      remoteRef:
        key: raf-banka/auth
        property: jwt-signing-key
    - secretKey: cvv-pepper
      remoteRef:
        key: raf-banka/auth
        property: cvv-pepper
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: banka-smtp
  namespace: raf-banka
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: banka-smtp
    creationPolicy: Owner
  data:
    - secretKey: host
      remoteRef: { key: raf-banka/smtp, property: host }
    - secretKey: port
      remoteRef: { key: raf-banka/smtp, property: port }
    - secretKey: username
      remoteRef: { key: raf-banka/smtp, property: username }
    - secretKey: password
      remoteRef: { key: raf-banka/smtp, property: password }
    - secretKey: from
      remoteRef: { key: raf-banka/smtp, property: from }
    - secretKey: tls
      remoteRef: { key: raf-banka/smtp, property: tls }
---
