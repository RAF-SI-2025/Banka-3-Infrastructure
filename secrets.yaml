# ExternalSecrets for raf-banka.
# Sync wave -10 — materialize before any Deployment (wave 0) mounts them.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: banka-auth
  namespace: raf-banka
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: banka-auth
    creationPolicy: Owner
  data:
    - secretKey: jwt-signing-key
      remoteRef:
        key: raf-banka/auth
        property: jwt-signing-key
    - secretKey: cvv-pepper
      remoteRef:
        key: raf-banka/auth
        property: cvv-pepper
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: banka-smtp
  namespace: raf-banka
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: banka-smtp
    creationPolicy: Owner
  data:
    - secretKey: host
      remoteRef: { key: raf-banka/smtp, property: host }
    - secretKey: port
      remoteRef: { key: raf-banka/smtp, property: port }
    - secretKey: username
      remoteRef: { key: raf-banka/smtp, property: username }
    - secretKey: password
      remoteRef: { key: raf-banka/smtp, property: password }
    - secretKey: from
      remoteRef: { key: raf-banka/smtp, property: from }
    - secretKey: tls
      remoteRef: { key: raf-banka/smtp, property: tls }
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: banka-interbank
  namespace: raf-banka
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: banka-interbank
    creationPolicy: Owner
  data:
    # api-key   — the key WE validate on INBOUND partner traffic (and the
    #             default OUTBOUND key when no per-partner key is set).
    - secretKey: api-key
      remoteRef: { key: raf-banka/interbank, property: api-key }
    # partner-keys — per-partner OUTBOUND keys, "code:key[,code:key]" form.
    #             Overrides api-key per bank (partners issue asymmetric keys).
    - secretKey: partner-keys
      remoteRef: { key: raf-banka/interbank, property: partner-keys }
---
# Celina-5 inter-bank message signatures. SEPARATE ExternalSecret so the
# shared HMAC secret can be added (and the feature switched on) on its own
# schedule — and only once BOTH banks hold the identical value. While the
# Vault key raf-banka/interbank-sign is absent this ExternalSecret is
# NotReady, but the deployments mount sign-key as optional, so traffic
# flows unsigned and the rest of interop is unaffected.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: banka-interbank-sign
  namespace: raf-banka
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: banka-interbank-sign
    creationPolicy: Owner
  data:
    - secretKey: sign-key
      remoteRef: { key: raf-banka/interbank-sign, property: sign-key }
---
