# Banka-3 manifests, flat layout.
#
# Single environment (prod). Namespace, ExternalSecrets, HTTPRoute and
# image tags all live here at the root — no base/overlays split.
#
# The hardcoded `namespace: raf-banka` values inside individual resource
# files are kept for editor jump-to-resource ergonomics; the top-level
# `namespace:` below rewrites them at build time anyway.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: raf-banka

# Propagate part-of onto every resource (and crucially, every pod template)
# so the PodMonitor in monitoring/podmonitor.yaml can select all banka pods
# with one label.
#   includeTemplates: true  → also stamp the label inside spec.template.metadata
#                             (default is false — caught us the first time)
#   includeSelectors: false → DON'T touch Deployment .spec.selector
#                             (immutable field, would block re-sync)
labels:
  - pairs:
      app.kubernetes.io/part-of: banka-3
    includeTemplates: true
    includeSelectors: false

resources:
  - namespace.yaml
  - secrets.yaml
  - httproute.yaml
  - postgres/cluster.yaml
  - postgres/poolers.yaml
  - redis/redis.yaml
  - migrate/job.yaml
  - services/user.yaml
  - services/bank.yaml
  - services/trading.yaml
  - services/exchange.yaml
  - services/notification.yaml
  - services/gateway.yaml
  - services/scheduler.yaml
  - frontend/frontend.yaml
  - monitoring/podmonitor.yaml
  - monitoring/prometheusrule.yaml
  - monitoring/alertmanagerconfig.yaml
  - monitoring/slo.yaml

# Tag everything for the current release. Bump in one place when cutting
# a new release. The 6 Go services share generated proto contracts so
# they ship in lockstep — kustomize's `images:` does the swap by image
# name, not by file edit, so a future tag bump only touches this block.
# `migrate` and `frontend` are independent build artifacts but we tag
# them at the same release for the same reason (atomic releases).
images:
  - name: registry.urosevicvuk.dev/raf-banka3/user
    newTag: v0.6.5
  - name: registry.urosevicvuk.dev/raf-banka3/bank
    newTag: v0.6.5
  - name: registry.urosevicvuk.dev/raf-banka3/trading
    newTag: v0.6.5
  - name: registry.urosevicvuk.dev/raf-banka3/exchange
    newTag: v0.6.5
  - name: registry.urosevicvuk.dev/raf-banka3/notification
    newTag: v0.6.5
  - name: registry.urosevicvuk.dev/raf-banka3/gateway
    newTag: v0.6.5
  - name: registry.urosevicvuk.dev/raf-banka3/scheduler
    newTag: v0.6.5
  - name: registry.urosevicvuk.dev/raf-banka3/migrate
    newTag: v0.6.5
  # Frontend trails backend by intent — it doesn't share the proto
  # contracts, so its release cadence is independent. Bump when the FE
  # gets a deploy-worthy change. Mirror to the backend tag during the
  # next release to converge.
  - name: registry.urosevicvuk.dev/raf-banka3/frontend
    newTag: v0.6.4

# Grafana sidecar discovers dashboards by the grafana_dashboard label
# across all namespaces by default. disableNameSuffixHash keeps the CM
# name stable so dashboard updates don't churn a new resource each sync.
# One CM per dashboard so an edit to one only churns its own resource.
configMapGenerator:
  - name: banka-overview-dashboard
    files:
      - monitoring/dashboards/banka-overview.json
    options:
      labels:
        grafana_dashboard: "1"
        app.kubernetes.io/part-of: banka-3
      disableNameSuffixHash: true
  - name: banka-services-red-dashboard
    files:
      - monitoring/dashboards/services-red.json
    options:
      labels:
        grafana_dashboard: "1"
        app.kubernetes.io/part-of: banka-3
      disableNameSuffixHash: true
  - name: banka-gateway-http-dashboard
    files:
      - monitoring/dashboards/gateway-http.json
    options:
      labels:
        grafana_dashboard: "1"
        app.kubernetes.io/part-of: banka-3
      disableNameSuffixHash: true
  - name: banka-logs-dashboard
    files:
      - monitoring/dashboards/logs.json
    options:
      labels:
        grafana_dashboard: "1"
        app.kubernetes.io/part-of: banka-3
      disableNameSuffixHash: true
  - name: banka-business-dashboard
    files:
      - monitoring/dashboards/business.json
    options:
      labels:
        grafana_dashboard: "1"
        app.kubernetes.io/part-of: banka-3
      disableNameSuffixHash: true
  # Community CNPG dashboard — pulled from
  # github.com/cloudnative-pg/grafana-dashboards (charts/cluster/
  # grafana-dashboard.json). DS_PROMETHEUS template variable was
  # stripped and replaced with our actual UID `prometheus` at
  # import time so it works under provisioning. Re-grab + re-apply
  # the same sed/jq treatment if the upstream version is updated.
  - name: banka-cnpg-dashboard
    files:
      - monitoring/dashboards/cnpg-cluster.json
    options:
      labels:
        grafana_dashboard: "1"
        app.kubernetes.io/part-of: banka-3
      disableNameSuffixHash: true
