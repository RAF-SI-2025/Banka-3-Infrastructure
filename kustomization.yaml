# Banka-3 deployment root.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: raf-banka

resources:
  - namespace.yaml
  - secrets.yaml
  - postgres/cluster.yaml
  - redis/redis.yaml
  - migrate/job.yaml
  - services/user.yaml
  - services/bank.yaml
  - services/trading.yaml
  - services/exchange.yaml
  - services/notification.yaml
  - services/gateway.yaml
  - frontend/frontend.yaml
  - httproute.yaml
  - monitoring/podmonitor.yaml
  - monitoring/prometheusrule.yaml
  - monitoring/alertmanagerconfig.yaml

# Grafana sidecar discovers dashboards by the grafana_dashboard label
# across all namespaces by default. disableNameSuffixHash keeps the CM
# name stable so dashboard updates don't churn a new resource each sync.
configMapGenerator:
  - name: banka-overview-dashboard
    namespace: raf-banka
    files:
      - monitoring/dashboards/banka-overview.json
    options:
      labels:
        grafana_dashboard: "1"
        app.kubernetes.io/part-of: banka-3
      disableNameSuffixHash: true
