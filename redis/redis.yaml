# Redis for verification codes, password-reset tokens, activation
# tokens, and the clock-debug offset. Single replica — data is
# ephemeral (TTLs ~minutes) but we keep a PVC so a pod restart
# doesn't blow away in-flight 6-digit codes mid-payment.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: banka-redis
  namespace: raf-banka
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: raf-banka
  labels:
    app.kubernetes.io/name: redis
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  replicas: 1
  strategy:
    type: Recreate   # RWO PVC
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:7.4-alpine
          args:
            - "--appendonly"
            - "yes"
            - "--dir"
            - "/data"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          ports:
            - name: redis
              containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            tcpSocket: { port: redis }
            periodSeconds: 5
          livenessProbe:
            tcpSocket: { port: redis }
            periodSeconds: 10
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 256Mi }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: banka-redis
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: raf-banka
spec:
  selector:
    app.kubernetes.io/name: redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
