# Dev hostname: bankadev.raf-project.com.
#
# Same Envoy gateway, same wildcard cloudflared tunnel — no DNS or
# tunnel edit needed. cert-manager will mint a separate cert per
# hostname via the existing ClusterIssuer.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: banka
spec:
  parentRefs:
    - name: gateway-external
      namespace: envoy-gateway-system
  hostnames:
    - bankadev.raf-project.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: gateway
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 8080
