# Dev overlay — auto-deploys whatever's latest on main.
#
# Differences from overlays/prod:
#   - namespace: raf-banka-dev (separate CNPG cluster, redis, secrets)
#   - hostname: bankadev.raf-project.com (separate cert, same wildcard tunnel)
#   - Vault paths: kv/raf-banka-dev/* (separate creds — different jwt key,
#     different SMTP creds, different Discord webhook so dev alerts
#     don't page on the prod channel)
#   - images: pinned to :main while we bootstrap; image automation
#     (step 4 of the dev-env rollout) will flip these to commit-SHAs
#     bumped on every main push.
#
# What is NOT different:
#   - All Deployments, HPAs, monitoring rules, dashboards, SLOs, etc.
#     come straight from base. Behavior matches prod so dev catches
#     regressions before they ship.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: raf-banka-dev

resources:
  - ../../base
  - namespace.yaml
  - secrets.yaml
  - httproute.yaml

# Per-env hostname rewrites for env vars hardcoded in base manifests.
# `target:` is required because the patch file has no namespace (we
# don't want to lock it to either prod or dev) — without `target:`,
# kustomize tries to match Deployment.v1.apps/user.[noNs] which is
# never any rendered resource.
patches:
  - path: patches/user-web-base-url.yaml
    target:
      kind: Deployment
      name: user

# Pin to :main while we bring up dev. The mutable tag means a pod
# restart picks up whatever's latest on main, but kubelet caches the
# first-seen digest under default IfNotPresent imagePullPolicy — so
# this is "fresh on rollout restart", not "auto-deploy on every push".
# Real continuous deployment lands in step 4 via CI-driven manifest
# bumps to specific commit SHAs.
images:
  - name: registry.urosevicvuk.dev/raf-banka3/user
    newTag: main
  - name: registry.urosevicvuk.dev/raf-banka3/bank
    newTag: main
  - name: registry.urosevicvuk.dev/raf-banka3/trading
    newTag: main
  - name: registry.urosevicvuk.dev/raf-banka3/exchange
    newTag: main
  - name: registry.urosevicvuk.dev/raf-banka3/notification
    newTag: main
  - name: registry.urosevicvuk.dev/raf-banka3/gateway
    newTag: main
  - name: registry.urosevicvuk.dev/raf-banka3/scheduler
    newTag: main
  - name: registry.urosevicvuk.dev/raf-banka3/migrate
    newTag: main
  - name: registry.urosevicvuk.dev/raf-banka3/frontend
    newTag: main
