# Dev ExternalSecrets — every remoteRef.key prefixed with raf-banka-dev/
# instead of raf-banka/. Populate the Vault paths once before the first
# sync (see README's "Required manual setup" — same shape, dev prefix):
#
#   vault kv put kv/raf-banka-dev/auth jwt-signing-key=... cvv-pepper=...
#   vault kv put kv/raf-banka-dev/smtp host=... port=... ...
#   vault kv put kv/raf-banka-dev/interbank api-key=...
#   vault kv put kv/raf-banka-dev/alphavantage api-key=...
#   vault kv put kv/raf-banka-dev/discord webhook-url=...  # dev channel
#   vault kv put kv/raf-banka-dev/registry-creds .dockerconfigjson=@...
#
# The shape mirrors overlays/prod/secrets.yaml on purpose — duplicating
# 6 ExternalSecrets is shorter than patching them and keeps each
# overlay independently readable.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: banka-auth
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: banka-auth
    creationPolicy: Owner
  data:
    - secretKey: jwt-signing-key
      remoteRef:
        key: raf-banka-dev/auth
        property: jwt-signing-key
    - secretKey: cvv-pepper
      remoteRef:
        key: raf-banka-dev/auth
        property: cvv-pepper
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: banka-smtp
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: banka-smtp
    creationPolicy: Owner
  data:
    - secretKey: host
      remoteRef: { key: raf-banka-dev/smtp, property: host }
    - secretKey: port
      remoteRef: { key: raf-banka-dev/smtp, property: port }
    - secretKey: username
      remoteRef: { key: raf-banka-dev/smtp, property: username }
    - secretKey: password
      remoteRef: { key: raf-banka-dev/smtp, property: password }
    - secretKey: from
      remoteRef: { key: raf-banka-dev/smtp, property: from }
    - secretKey: tls
      remoteRef: { key: raf-banka-dev/smtp, property: tls }
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: banka-interbank
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: banka-interbank
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef: { key: raf-banka-dev/interbank, property: api-key }
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: banka-alphavantage
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: banka-alphavantage
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef: { key: raf-banka-dev/alphavantage, property: api-key }
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: banka-discord
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: banka-discord
    creationPolicy: Owner
  data:
    - secretKey: webhook-url
      remoteRef:
        key: raf-banka-dev/discord
        property: webhook-url
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-pull
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: harbor-pull
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: "{{ .dockerconfigjson }}"
  data:
    - secretKey: dockerconfigjson
      remoteRef:
        key: raf-banka-dev/registry-creds
        property: .dockerconfigjson
