# Single public hostname.
#   /api/*  → gateway:8080  (HTTP/JSON ↔ gRPC bridge)
#   /*      → frontend:8080 (Vite SPA via nginx)
#
# Path-prefix matching evaluates longest-prefix first, so /api/* wins
# over /. cert-manager + external-dns + cloudflared on gateway-external
# handle TLS + DNS + tunnel. DNS record for banka.raf-project.com must
# point at the cloudflared tunnel (manual one-time step).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: banka
  namespace: raf-banka
spec:
  parentRefs:
    - name: gateway-external
      namespace: envoy-gateway-system
  hostnames:
    - banka.raf-project.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: gateway
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 8080
