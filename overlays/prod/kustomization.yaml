# Production overlay.
#
# Mirrors the pre-overlay shape: namespace raf-banka, banka.raf-project.com,
# Vault paths under kv/raf-banka/, images pinned to a release tag.
#
# Image bumps are deliberate gitops events: edit `images:` below to bump
# every service in lockstep (release tags atomically). Dev floats per
# commit-sha via image automation; prod doesn't — that's the point.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: raf-banka

resources:
  - ../../base
  - namespace.yaml
  - secrets.yaml
  - httproute.yaml

# Tag everything for the current release. Bump in one place when cutting
# a new prod release. The 6 Go services share generated proto contracts
# so they ship in lockstep — kustomize's `images:` does the swap by
# image name, not by file edit, so a future tag bump only touches this
# block. `migrate` and `frontend` are independent build artifacts but
# we tag them at the same release for the same reason (atomic releases).
images:
  - name: registry.urosevicvuk.dev/raf-banka3/user
    newTag: v0.3.5
  - name: registry.urosevicvuk.dev/raf-banka3/bank
    newTag: v0.3.5
  - name: registry.urosevicvuk.dev/raf-banka3/trading
    newTag: v0.3.5
  - name: registry.urosevicvuk.dev/raf-banka3/exchange
    newTag: v0.3.5
  - name: registry.urosevicvuk.dev/raf-banka3/notification
    newTag: v0.3.5
  - name: registry.urosevicvuk.dev/raf-banka3/gateway
    newTag: v0.3.5
  - name: registry.urosevicvuk.dev/raf-banka3/scheduler
    newTag: v0.3.5
  - name: registry.urosevicvuk.dev/raf-banka3/migrate
    newTag: v0.3.5
  # Frontend trails backend by intent — it doesn't share the proto
  # contracts, so its release cadence is independent. Bump when the FE
  # gets a deploy-worthy change. Mirror to the backend tag during the
  # next release to converge.
  - name: registry.urosevicvuk.dev/raf-banka3/frontend
    newTag: v0.3.0
