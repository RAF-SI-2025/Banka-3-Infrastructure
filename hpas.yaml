# HPAs for the stateless services. Each scales on CPU utilization
# against the Deployment's requests.cpu (set in services/*.yaml and
# frontend/frontend.yaml). The "stateless" set is the four pods with
# no embedded background work — bank/trading/exchange are deliberately
# excluded until the cron-extraction lands on the backend, because
# duplicating those cron loops across replicas would double-debit /
# double-fill / double-tax. See README / project memory.
#
# Behavior tuned to avoid replica flapping:
#   * stabilizationWindowSeconds=120 on scaleDown — wait two minutes
#     of sustained low CPU before peeling a replica off.
#   * scaleUp leaves Kubernetes defaults (0s stabilization, aggressive
#     percent-based growth) so a real traffic burst gets capacity fast.
#
# Resource-metric source: metrics-server (apps/system/foundation/
# metrics-server in ykube). HPA fails closed (no scaling action) if
# metrics-server is unhealthy, which is the safe default.
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway
  namespace: raf-banka
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: banka-3
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
