# PreSync hook: walks every service's migrations dir in dependency
# order (user → exchange → bank → notification → trading) and applies
# pending migrations against the banka DB. Each run is idempotent —
# golang-migrate skips already-applied versions per schema.
#
# The image baked at build time contains:
#   /usr/local/bin/migrate
#   /migrations/<svc>/*.sql
#   /usr/local/bin/run-migrations.sh   (loops the 5 services)
#
# Image is produced by Banka-3-Backend/.github/workflows/build.yml from
# docker/Dockerfile.migrate.
apiVersion: batch/v1
kind: Job
metadata:
  name: banka-migrate
  namespace: raf-banka
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: banka-migrate
    spec:
      restartPolicy: OnFailure
      imagePullSecrets:
        - name: harbor-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: registry.urosevicvuk.dev/raf-banka3/migrate:main
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          command: ["/usr/local/bin/run-migrations.sh"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: banka-pg-app
                  key: uri
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 256Mi }
