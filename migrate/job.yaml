# Regular Sync resource at wave 0. Walks every service's migrations dir
# in dependency order (user → exchange → bank → notification → trading)
# and applies pending migrations against the banka DB. Each run is
# idempotent — golang-migrate skips already-applied versions per schema.
#
# Was originally a PreSync hook but that race-condition'd: PreSync runs
# BEFORE the Sync phase, so harbor-pull (ESO) and banka-pg-app (CNPG)
# don't exist yet → ImagePullBackOff + no DATABASE_URL. As a regular
# Sync resource at wave 0, Argo runs us only after wave -10 (ESOs) and
# wave -5 (CNPG cluster + Redis) report Healthy.
#
# `Replace=true` so re-syncs re-create the Job instead of failing on
# "Job is immutable." `ttlSecondsAfterFinished` cleans up the completed
# Pod after 10 min.
#
# The image baked at build time contains:
#   /usr/local/bin/migrate
#   /migrations/<svc>/*.sql
#   /usr/local/bin/run-migrations.sh   (loops the 5 services)
#
# Image is produced by Banka-3-Backend/.github/workflows/build.yml from
# docker/Dockerfile.migrate.
apiVersion: batch/v1
kind: Job
metadata:
  name: banka-migrate
  namespace: raf-banka
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/sync-options: Replace=true
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: banka-migrate
    spec:
      restartPolicy: OnFailure
      imagePullSecrets:
        - name: harbor-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: registry.urosevicvuk.dev/raf-banka3/migrate:main
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          command: ["/usr/local/bin/run-migrations.sh"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: banka-pg-app
                  key: uri
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 256Mi }
