apiVersion: apps/v1
kind: Deployment
metadata:
  name: exchange
  namespace: raf-banka
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  labels:
    app.kubernetes.io/name: exchange
    app.kubernetes.io/part-of: banka-3
spec:
  # Replicas managed by the HPA in hpas.yaml — omitted so server-side
  # apply leaves it to the HPA controller. The FX feeder is owned by
  # the scheduler service now (JOBS_ENABLED=false below).
  selector:
    matchLabels:
      app.kubernetes.io/name: exchange
  template:
    metadata:
      labels:
        app.kubernetes.io/name: exchange
    spec:
      imagePullSecrets:
        - name: harbor-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: exchange
          image: registry.urosevicvuk.dev/raf-banka3/exchange:v0.3.5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          ports:
            - { name: grpc,    containerPort: 50051 }
            - { name: probe,   containerPort: 8081 }
            - { name: metrics, containerPort: 9090 }
          env:
            - { name: GRPC_PORT,  value: "50051" }
            - { name: PROBE_PORT, value: "8081" }
            - { name: LOG_LEVEL,  value: info }
            - { name: LOG_FORMAT, value: json }
            - { name: OTEL_EXPORTER_OTLP_ENDPOINT, value: "http://alloy.alloy:4317" }
            - name: OTEL_SERVICE_NAME
              valueFrom: { fieldRef: { fieldPath: "metadata.labels['app.kubernetes.io/name']" } }
            # Both URLs target CNPG Poolers (PgBouncer, transaction
            # mode). pkg/postgres opens the RW pool against
            # banka-pg-pooler-rw and the RO pool against
            # banka-pg-pooler-ro; WithRead(ctx) routes to the read
            # pool.
            - name: BANKA_DB_USER
              valueFrom: { secretKeyRef: { name: banka-pg-app, key: username } }
            - name: BANKA_DB_PASS
              valueFrom: { secretKeyRef: { name: banka-pg-app, key: password } }
            - name: DATABASE_URL
              value: "postgres://$(BANKA_DB_USER):$(BANKA_DB_PASS)@banka-pg-pooler-rw:5432/banka"
            - name: DATABASE_READ_URL
              value: "postgres://$(BANKA_DB_USER):$(BANKA_DB_PASS)@banka-pg-pooler-ro:5432/banka"
            # FX feeder loop owned by the scheduler service. Exchange
            # still exposes RefreshFXRates RPC; scheduler calls it on
            # its FX_FEED_INTERVAL cadence.
            - { name: JOBS_ENABLED,     value: "false" }
            - { name: REDIS_ADDR,       value: "redis:6379" }
            - { name: FX_FEED_INTERVAL, value: "5m" }
            - { name: FX_FEED_SPREAD,   value: "0.01" }
          readinessProbe:
            httpGet: { path: /readyz, port: probe }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: probe }
            periodSeconds: 10
          # Lightweight read-mostly service (catalog + FX rate reads).
          # Requests sized accordingly; HPA denominator.
          resources:
            requests: { cpu: 50m, memory: 96Mi }
            limits:   { memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: exchange
  namespace: raf-banka
spec:
  selector:
    app.kubernetes.io/name: exchange
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
      appProtocol: grpc
