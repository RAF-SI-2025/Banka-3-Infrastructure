apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification
  namespace: raf-banka
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  labels:
    app.kubernetes.io/name: notification
    app.kubernetes.io/part-of: banka-3
spec:
  # Replicas managed by the HPA in hpas.yaml — omitted so server-side
  # apply leaves it to the HPA controller's field manager.
  selector:
    matchLabels:
      app.kubernetes.io/name: notification
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notification
    spec:
      imagePullSecrets:
        - name: harbor-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: notification
          image: registry.urosevicvuk.dev/raf-banka3/notification:v0.3.5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          ports:
            - { name: grpc,    containerPort: 50051 }
            - { name: probe,   containerPort: 8081 }
            - { name: metrics, containerPort: 9090 }
          env:
            - { name: GRPC_PORT,  value: "50051" }
            - { name: PROBE_PORT, value: "8081" }
            - { name: LOG_LEVEL,  value: info }
            - { name: LOG_FORMAT, value: json }
            - { name: OTEL_EXPORTER_OTLP_ENDPOINT, value: "http://alloy.alloy:4317" }
            - name: OTEL_SERVICE_NAME
              valueFrom: { fieldRef: { fieldPath: "metadata.labels['app.kubernetes.io/name']" } }
            # Both URLs target CNPG Poolers (PgBouncer, transaction
            # mode). pkg/postgres opens the RW pool against
            # banka-pg-pooler-rw and the RO pool against
            # banka-pg-pooler-ro; WithRead(ctx) routes to the read
            # pool.
            - name: BANKA_DB_USER
              valueFrom: { secretKeyRef: { name: banka-pg-app, key: username } }
            - name: BANKA_DB_PASS
              valueFrom: { secretKeyRef: { name: banka-pg-app, key: password } }
            - name: DATABASE_URL
              value: "postgres://$(BANKA_DB_USER):$(BANKA_DB_PASS)@banka-pg-pooler-rw:5432/banka"
            - name: DATABASE_READ_URL
              value: "postgres://$(BANKA_DB_USER):$(BANKA_DB_PASS)@banka-pg-pooler-ro:5432/banka"
            - { name: REDIS_ADDR, value: "redis:6379" }
            - name: SMTP_HOST
              valueFrom: { secretKeyRef: { name: banka-smtp, key: host,     optional: true } }
            - name: SMTP_PORT
              valueFrom: { secretKeyRef: { name: banka-smtp, key: port,     optional: true } }
            - name: SMTP_USERNAME
              valueFrom: { secretKeyRef: { name: banka-smtp, key: username, optional: true } }
            - name: SMTP_PASSWORD
              valueFrom: { secretKeyRef: { name: banka-smtp, key: password, optional: true } }
            - name: SMTP_FROM
              valueFrom: { secretKeyRef: { name: banka-smtp, key: from,     optional: true } }
            - name: SMTP_TLS
              valueFrom: { secretKeyRef: { name: banka-smtp, key: tls,      optional: true } }
          readinessProbe:
            httpGet: { path: /readyz, port: probe }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: probe }
            periodSeconds: 10
          # Modest requests — this service is mostly idle, just relays
          # gRPC notification requests out to SMTP. HPA target lifts
          # us off 1 replica only when an email burst is in flight.
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits:   { memory: 192Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: notification
  namespace: raf-banka
spec:
  selector:
    app.kubernetes.io/name: notification
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
      appProtocol: grpc
