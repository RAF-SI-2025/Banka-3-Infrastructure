apiVersion: apps/v1
kind: Deployment
metadata:
  name: bank
  namespace: raf-banka
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  labels:
    app.kubernetes.io/name: bank
    app.kubernetes.io/part-of: banka-3
spec:
  # Replicas managed by the HPA in hpas.yaml. Field is intentionally
  # omitted so server-side apply leaves it to the HPA controller's
  # field manager — Argo won't fight HPA-driven scale events.
  selector:
    matchLabels:
      app.kubernetes.io/name: bank
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bank
    spec:
      imagePullSecrets:
        - name: harbor-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bank
          image: registry.urosevicvuk.dev/raf-banka3/bank:v0.3.5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          ports:
            - { name: grpc,    containerPort: 50051 }
            - { name: probe,   containerPort: 8081 }
            - { name: metrics, containerPort: 9090 }
          env:
            - { name: GRPC_PORT,  value: "50051" }
            - { name: PROBE_PORT, value: "8081" }
            - { name: LOG_LEVEL,  value: info }
            - { name: LOG_FORMAT, value: json }
            # OTel SDK config — pkg/otelinit reads these. The endpoint
            # is Alloy's in-cluster OTLP gRPC receiver; Alloy forwards
            # traces to Tempo. OTEL_SERVICE_NAME is sourced from the
            # pod label so every replica reports the same logical svc.
            - { name: OTEL_EXPORTER_OTLP_ENDPOINT, value: "http://alloy.alloy:4317" }
            - name: OTEL_SERVICE_NAME
              valueFrom: { fieldRef: { fieldPath: "metadata.labels['app.kubernetes.io/name']" } }
            # Both URLs target the CNPG Poolers (PgBouncer, transaction
            # mode), not the bare cluster Services. pkg/postgres opens
            # the RW pool against banka-pg-pooler-rw and the RO pool
            # against banka-pg-pooler-ro; WithRead(ctx)-marked queries
            # land on the read pool. Migrate Job stays on the bare
            # banka-pg-rw via banka-pg-app.uri.
            - name: BANKA_DB_USER
              valueFrom: { secretKeyRef: { name: banka-pg-app, key: username } }
            - name: BANKA_DB_PASS
              valueFrom: { secretKeyRef: { name: banka-pg-app, key: password } }
            - name: DATABASE_URL
              value: "postgres://$(BANKA_DB_USER):$(BANKA_DB_PASS)@banka-pg-pooler-rw:5432/banka"
            - name: DATABASE_READ_URL
              value: "postgres://$(BANKA_DB_USER):$(BANKA_DB_PASS)@banka-pg-pooler-ro:5432/banka"
            # Background jobs (installments, variable-rate, maintenance-fee,
            # spent-reset) are owned by the scheduler service. With this
            # off, every bank pod becomes a pure request handler and the
            # HPA can scale freely without double-firing crons.
            - { name: JOBS_ENABLED,           value: "false" }
            - { name: REDIS_ADDR,             value: "redis:6379" }
            - { name: USER_GRPC_ADDR,         value: "user:50051" }
            - { name: EXCHANGE_GRPC_ADDR,     value: "exchange:50051" }
            - { name: NOTIFICATION_GRPC_ADDR, value: "notification:50051" }
            - { name: BANK_CODE,              value: "333" }
            - { name: BANK_NAME,              value: "Banka 3" }
            - { name: BANK_ROUTING_NUMBER,    value: "333" }
            - { name: FX_COMMISSION,          value: "0.005" }
            - name: BANK_CVV_PEPPER
              valueFrom: { secretKeyRef: { name: banka-auth, key: cvv-pepper } }
            - name: SMTP_HOST
              valueFrom: { secretKeyRef: { name: banka-smtp, key: host,     optional: true } }
            - name: SMTP_PORT
              valueFrom: { secretKeyRef: { name: banka-smtp, key: port,     optional: true } }
            - name: SMTP_USERNAME
              valueFrom: { secretKeyRef: { name: banka-smtp, key: username, optional: true } }
            - name: SMTP_PASSWORD
              valueFrom: { secretKeyRef: { name: banka-smtp, key: password, optional: true } }
            - name: SMTP_FROM
              valueFrom: { secretKeyRef: { name: banka-smtp, key: from,     optional: true } }
            - name: SMTP_TLS
              valueFrom: { secretKeyRef: { name: banka-smtp, key: tls,      optional: true } }
          readinessProbe:
            httpGet: { path: /readyz, port: probe }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: probe }
            periodSeconds: 10
          # Requests are the HPA's denominator; without them HPA can't
          # compute utilization. Bank carries DB transactions + FX
          # math + the largest service surface, hence higher requests
          # than the lighter services.
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { memory: 384Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: bank
  namespace: raf-banka
spec:
  selector:
    app.kubernetes.io/name: bank
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
      appProtocol: grpc
