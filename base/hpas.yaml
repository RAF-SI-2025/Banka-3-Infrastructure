# HPAs for every horizontally-scalable service. Each scales on CPU
# utilization against the Deployment's requests.cpu (set in services/*.yaml
# and frontend/frontend.yaml). bank/trading/exchange joined this set
# once the scheduler service took over their in-process cron loops
# (JOBS_ENABLED=false in their Deployments) — duplicating those crons
# across replicas would have double-fired tax jobs / FX feeders /
# installment runs. Scheduler itself is NOT in this list: it's
# leader-elected with replicas=2, followers do no useful work.
#
# minReplicas=3 across the board (notification at 2 since it's
# mostly idle). Deployments intentionally omit `spec.replicas` so
# server-side apply leaves the field to the HPA controller's field
# manager and Argo doesn't fight scale events.
#
# Behavior tuning:
#   * stabilizationWindowSeconds=120 on scaleDown — two minutes of
#     sustained low CPU before peeling a replica off.
#   * scaleUp left at k8s defaults (0s stabilization, percent-based
#     growth) so a real burst gets capacity fast.
#
# Resource-metric source: k3s's bundled metrics-server. HPA fails
# closed (no scaling action) if metrics-server is unhealthy, which
# is the safe default.
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway
  namespace: raf-banka
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: banka-3
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway
  minReplicas: 1
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
---
