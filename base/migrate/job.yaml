# Argo Sync hook that walks every service's migrations dir in
# dependency order (user ‚Üí exchange ‚Üí bank ‚Üí notification ‚Üí trading)
# and applies pending migrations against the banka DB. Idempotent ‚Äî
# golang-migrate skips already-applied versions per schema.
#
# # Why a hook, not a regular Sync resource
#
# k8s Job spec is immutable on most fields (pod template, containers,
# image, env). When you bump the migrate image tag, a regular Sync
# resource hits "field is immutable" on apply, Argo flips Degraded,
# and you have to `kubectl delete job` by hand before the next sync.
#
# Annotating as `hook: Sync` + `hook-delete-policy: BeforeHookCreation`
# tells Argo to delete the previous Job before applying the new one
# on every sync ‚Äî no more immutable-field rejections.
#
# `Sync` is critical here, not `PreSync`. PreSync runs BEFORE the
# Sync phase, so wave-flagged dependencies (harbor-pull from ESO,
# banka-pg-app from CNPG) don't exist yet at PreSync time ‚Üí the Job
# pod fails on ImagePullBackOff + missing DATABASE_URL. `Sync` hooks
# run as part of the Sync phase and honor sync-wave normally ‚Äî wave 0
# still runs after wave -10 (ESOs) and wave -5 (CNPG + Redis).
#
# `ttlSecondsAfterFinished: 600` cleans the completed pod after 10
# min. We don't need `hook-delete-policy: HookSucceeded` ‚Äî the next
# sync deletes via BeforeHookCreation anyway, and the TTL keeps the
# namespace tidy between syncs.
#
# # The image
#
# Built by Banka-3-Backend/.github/workflows/build.yml from
# docker/Dockerfile.migrate. Contains:
#   /usr/local/bin/migrate
#   /migrations/<svc>/*.sql
#   /usr/local/bin/run-migrations.sh   (loops the 5 services)
apiVersion: batch/v1
kind: Job
metadata:
  name: banka-migrate
  namespace: raf-banka
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "0"
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: banka-migrate
    spec:
      restartPolicy: OnFailure
      imagePullSecrets:
        - name: harbor-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: registry.urosevicvuk.dev/raf-banka3/migrate:v0.3.5
          # Always re-pull ‚Äî :main is a mutable tag and we iterate on the
          # migrate script during deploy bring-up. Otherwise kubelet keeps
          # the first cached digest forever (IfNotPresent default).
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          command: ["/usr/local/bin/run-migrations.sh"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: banka-pg-app
                  key: uri
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 256Mi }
