# Scrape /metrics from every banka-3 backend pod's dedicated metrics
# port (9090), exposed by pkg/otelinit.Provider.RunMetricsServer on a
# separate listener from the probe server.
#
# Why a separate port from probe: a failing readiness probe used to
# black out the scrape too — exactly when we needed metrics most.
# Splitting them costs nothing and means an in-trouble pod still
# surfaces its degradation in Grafana.
#
# Frontend has no metrics port — prometheus-operator silently skips
# pods missing the named port, so it's safe to select by the shared
# part-of label.
#
# Relabel: the default `job` label on PodMonitor-derived targets is
# the PodMonitor name (banka-services), which would collapse all 6
# services onto one job. We rewrite `job` from
# app.kubernetes.io/name so existing alert expressions
# (`up{job=~"gateway|user|..."}`) keep working. The OTel SDK also
# stamps `service_name` as a metric label; both work.
#
# Picked up automatically by the cluster Prometheus —
# podMonitorSelectorNilUsesHelmValues: false in ykube's
# kube-prometheus-stack values means a nil selector matches every
# PodMonitor cluster-wide.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: banka-services
  namespace: raf-banka
  labels:
    app.kubernetes.io/part-of: banka-3
spec:
  selector:
    matchLabels:
      app.kubernetes.io/part-of: banka-3
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
          targetLabel: job
