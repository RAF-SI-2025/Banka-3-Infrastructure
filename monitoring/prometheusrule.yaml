# Liveness-style "absence of metrics" alert for every banka service.
# The richer SLO/burn-rate alerts (5xx rate, gRPC errors, latency)
# live in monitoring/slo.yaml — Sloth generates the recording rules
# + multi-burn-rate alerts from there. This file only keeps the up{}
# guard because Sloth's alerts are rate-based and can't catch a
# totally idle service.
#
# `tenant: raf` is added so the AlertmanagerConfig in this namespace
# can match cleanly (in addition to the auto-added
# `namespace="raf-banka"` matcher from the operator's OnNamespace
# matcher strategy).
#
# Picked up automatically — ruleSelectorNilUsesHelmValues: false in
# ykube's kube-prometheus-stack values means a nil selector matches
# every PrometheusRule cluster-wide.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: banka-platform
  namespace: raf-banka
  labels:
    app.kubernetes.io/part-of: banka-3
    tenant: raf
spec:
  groups:
    - name: banka-platform
      rules:
        - alert: BankaServiceDown
          expr: up{job=~"gateway|user|notification|bank|exchange|trading"} == 0
          for: 1m
          labels:
            severity: critical
            tenant: raf
          annotations:
            summary: "{{ $labels.job }} is down"
            description: "Prometheus cannot scrape {{ $labels.job }} for more than 1 minute."
