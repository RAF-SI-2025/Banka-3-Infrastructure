# Ported verbatim from Banka-3-Backend/monitoring/prometheus/alerts.yml
# so the same alerts that run against docker-compose also run in-cluster.
#
# `tenant: raf` is added so the AlertmanagerConfig in this namespace can
# match cleanly (in addition to the auto-added `namespace=raf-banka`
# matcher from the operator's OnNamespace matcher strategy).
#
# Picked up automatically — ruleSelectorNilUsesHelmValues: false in
# ykube's kube-prometheus-stack values means a nil selector matches
# every PrometheusRule cluster-wide.
#
# Note: trading isn't in the BankaServiceDown regex below; that mirrors
# the original alerts.yml exactly. Worth revisiting upstream.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: banka-platform
  namespace: raf-banka
  labels:
    app.kubernetes.io/part-of: banka-3
    tenant: raf
spec:
  groups:
    - name: banka-platform
      rules:
        - alert: BankaServiceDown
          expr: up{job=~"gateway|user|notification|bank|exchange"} == 0
          for: 1m
          labels:
            severity: critical
            tenant: raf
          annotations:
            summary: "{{ $labels.job }} is down"
            description: "Prometheus cannot scrape {{ $labels.job }} for more than 1 minute."

        - alert: GatewayHighErrorRate
          expr: |
            (
              sum(rate(banka_http_requests_total{service="gateway",status=~"5.."}[5m]))
              /
              clamp_min(sum(rate(banka_http_requests_total{service="gateway"}[5m])), 0.001)
            ) > 0.05
          for: 2m
          labels:
            severity: warning
            tenant: raf
          annotations:
            summary: "Gateway 5xx rate is high"
            description: "Gateway is returning more than 5% 5xx responses over the last 5 minutes."

        - alert: GrpcErrorsDetected
          expr: sum by (service, rpc_service, rpc_method) (increase(banka_grpc_requests_total{code!="OK"}[5m])) > 0
          for: 2m
          labels:
            severity: warning
            tenant: raf
          annotations:
            summary: "gRPC errors detected in {{ $labels.service }}"
            description: "{{ $labels.rpc_service }}/{{ $labels.rpc_method }} returned non-OK gRPC codes in the last 5 minutes."
