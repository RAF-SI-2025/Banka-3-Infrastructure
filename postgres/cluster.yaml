# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/postgresql.cnpg.io/cluster_v1.json
#
# 3-instance CNPG cluster: one primary + two hot standbys. CNPG
# auto-publishes three Services in this namespace:
#
#   banka-pg-rw  → current primary (failover-aware, RW)
#   banka-pg-ro  → standbys only (round-robin, read-only, async-lagged)
#   banka-pg-r   → any instance
#
# Two CNPG Poolers (see poolers.yaml) sit in front of -rw and -ro:
# banka-pg-pooler-rw and banka-pg-pooler-ro. Apps connect to those
# pooler Services; the bare -rw/-ro cluster Services are reserved for
# admin tooling and the migrate Job. App-side routing lives in
# pkg/postgres: each service holds a *DB with RW + RO pools; writes
# and tx default to -rw, opt-in reads marked with postgres.WithRead(ctx)
# hit -ro. The Deployment manifests compose DATABASE_URL and
# DATABASE_READ_URL from the banka-pg-app secret credentials, swapping
# the host for each pooler endpoint.
#
# Major-version bump (16.4 → 18) is not in-place: CNPG's validating
# webhook rejects mismatched postgresVersion against an existing PVC.
# When this manifest first applies:
#   kubectl delete cluster -n raf-banka banka-pg
# Argo re-creates with the new spec, the wave-0 migrate Job rebuilds
# the schema, `make seed` repopulates fixtures.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: banka-pg
  namespace: raf-banka
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:18.0
  storage:
    size: 30Gi
    storageClass: longhorn
  bootstrap:
    initdb:
      database: banka
      owner: banka
  # Spread instances across nodes when the topology allows it.
  # `preferred` (not `required`) so a single-node ykube still
  # schedules all three replicas onto the same host.
  affinity:
    enablePodAntiAffinity: true
    podAntiAffinityType: preferred
    topologyKey: kubernetes.io/hostname
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi
  monitoring:
    enablePodMonitor: true
