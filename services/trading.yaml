apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading
  namespace: raf-banka
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  labels:
    app.kubernetes.io/name: trading
    app.kubernetes.io/part-of: banka-3
spec:
  # Replicas managed by the HPA in hpas.yaml — omitted so server-side
  # apply leaves it to the HPA controller. Trading's execution worker /
  # SAGA recovery / OTC expiry / market-data refresh / actuary reset /
  # tax cron / options refresh / fund-perf snapshot all live in the
  # scheduler service now (JOBS_ENABLED=false below), so every replica
  # is a pure request handler safe to scale.
  selector:
    matchLabels:
      app.kubernetes.io/name: trading
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trading
    spec:
      imagePullSecrets:
        - name: harbor-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: trading
          image: registry.urosevicvuk.dev/raf-banka3/trading:v0.3.5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          ports:
            - { name: grpc,    containerPort: 50051 }
            - { name: probe,   containerPort: 8081 }
            - { name: metrics, containerPort: 9090 }
          env:
            - { name: GRPC_PORT,  value: "50051" }
            - { name: PROBE_PORT, value: "8081" }
            - { name: LOG_LEVEL,  value: info }
            - { name: LOG_FORMAT, value: json }
            - { name: OTEL_EXPORTER_OTLP_ENDPOINT, value: "http://alloy.alloy:4317" }
            - name: OTEL_SERVICE_NAME
              valueFrom: { fieldRef: { fieldPath: "metadata.labels['app.kubernetes.io/name']" } }
            # Both URLs target CNPG Poolers (PgBouncer, transaction
            # mode). pkg/postgres opens the RW pool against
            # banka-pg-pooler-rw and the RO pool against
            # banka-pg-pooler-ro; WithRead(ctx) routes to the read
            # pool.
            - name: BANKA_DB_USER
              valueFrom: { secretKeyRef: { name: banka-pg-app, key: username } }
            - name: BANKA_DB_PASS
              valueFrom: { secretKeyRef: { name: banka-pg-app, key: password } }
            - name: DATABASE_URL
              value: "postgres://$(BANKA_DB_USER):$(BANKA_DB_PASS)@banka-pg-pooler-rw:5432/banka"
            - name: DATABASE_READ_URL
              value: "postgres://$(BANKA_DB_USER):$(BANKA_DB_PASS)@banka-pg-pooler-ro:5432/banka"
            # Background workers + crons (execution, saga-recovery,
            # otc-expiry, options-refresh, market-data, actuary-reset,
            # monthly tax, fund-perf) live in the scheduler service.
            - { name: JOBS_ENABLED,               value: "false" }
            - { name: REDIS_ADDR,                 value: "redis:6379" }
            - { name: BANK_GRPC_ADDR,             value: "bank:50051" }
            - { name: EXCHANGE_GRPC_ADDR,         value: "exchange:50051" }
            - { name: NOTIFICATION_GRPC_ADDR,     value: "notification:50051" }
            - { name: USER_GRPC_ADDR,             value: "user:50051" }
            - { name: EXECUTION_TICK_INTERVAL,    value: "10s" }
            - { name: MARKET_DATA_REFRESH_INTERVAL, value: "6h" }
            - { name: MARKET_DATA_PAUSE,          value: "13s" }
            - { name: STOCK_BIDASK_SPREAD,        value: "0.001" }
            - { name: SAGA_DEBUG_FAULT_INJECTION, value: "false" }
            - { name: CLOCK_DEBUG,                value: "false" }
            # Celina 5 — outbound inter-bank. trading (NOT the gateway) reads
            # INTERBANK_ROUTES; the gateway only needs INTERBANK_API_KEY for
            # the inbound surface. INTERBANK_ROUTES base is the partner ROOT —
            # our client appends /interbank/... itself. Banka-4's interbank
            # service is plain HTTP on :8083 (no TLS). NOTE: outbound calls
            # will 401 until Banka-4 registers us (routing 333) as a peer.
            - { name: BANK_ROUTING_NUMBER,        value: "333" }
            - { name: INTERBANK_ROUTES,           value: "444:http://rafsi.davidovic.io:8083" }
            - name: INTERBANK_API_KEY
              valueFrom: { secretKeyRef: { name: banka-interbank, key: api-key } }
            # Per-partner OUTBOUND keys ("code:key"). optional: unset →
            # falls back to INTERBANK_API_KEY when calling partners.
            - name: INTERBANK_PARTNER_KEYS
              valueFrom: { secretKeyRef: { name: banka-interbank, key: partner-keys, optional: true } }
            # celina-5 signature on OUTBOUND partner traffic. optional:
            # unset → outbound messages go unsigned (feature off).
            - name: INTERBANK_SIGN_KEY
              valueFrom: { secretKeyRef: { name: banka-interbank-sign, key: sign-key, optional: true } }
            - name: ALPHAVANTAGE_API_KEY
              valueFrom: { secretKeyRef: { name: banka-alphavantage, key: api-key, optional: true } }
          readinessProbe:
            httpGet: { path: /readyz, port: probe }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: probe }
            periodSeconds: 10
          # Requests sized for the trading request path post-extraction
          # (no more in-process workers); HPA denominator.
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { memory: 384Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: trading
  namespace: raf-banka
spec:
  selector:
    app.kubernetes.io/name: trading
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
      appProtocol: grpc
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: trading
  namespace: raf-banka
  labels:
    app.kubernetes.io/name: trading
    app.kubernetes.io/part-of: banka-3
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: trading
  minReplicas: 3
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
