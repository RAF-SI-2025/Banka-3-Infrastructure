# Only public surface. HTTP/JSON ↔ gRPC fan-out, JWT middleware,
# Idempotency-Key + X-Verification-* header consumption, interbank
# inbound API.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: raf-banka
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: banka-3
spec:
  # Replicas managed by the HPA in hpas.yaml — omitted so server-side
  # apply leaves it to the HPA controller's field manager.
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway
    spec:
      imagePullSecrets:
        - name: harbor-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: registry.urosevicvuk.dev/raf-banka3/gateway:v0.3.5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          ports:
            - { name: http,    containerPort: 8080 }
            - { name: probe,   containerPort: 8081 }
            - { name: metrics, containerPort: 9090 }
          env:
            - { name: GATEWAY_HTTP_PORT, value: "8080" }
            - { name: PROBE_PORT,        value: "8081" }
            - { name: LOG_LEVEL,         value: info }
            - { name: LOG_FORMAT,        value: json }
            - { name: OTEL_EXPORTER_OTLP_ENDPOINT, value: "http://alloy.alloy:4317" }
            - name: OTEL_SERVICE_NAME
              valueFrom: { fieldRef: { fieldPath: "metadata.labels['app.kubernetes.io/name']" } }
            - { name: REDIS_ADDR,        value: "redis:6379" }
            - { name: USER_GRPC_ADDR,         value: "user:50051" }
            - { name: BANK_GRPC_ADDR,         value: "bank:50051" }
            - { name: TRADING_GRPC_ADDR,      value: "trading:50051" }
            - { name: EXCHANGE_GRPC_ADDR,     value: "exchange:50051" }
            - { name: NOTIFICATION_GRPC_ADDR, value: "notification:50051" }
            - { name: BANK_ROUTING_NUMBER,    value: "333" }
            - { name: INTERBANK_ROUTES,       value: "" }
            - { name: CLOCK_DEBUG,            value: "false" }
            - name: JWT_SIGNING_KEY
              valueFrom: { secretKeyRef: { name: banka-auth, key: jwt-signing-key } }
            - name: INTERBANK_API_KEY
              valueFrom: { secretKeyRef: { name: banka-interbank, key: api-key } }
            # celina-5 signature verification on INBOUND partner traffic.
            # optional: unset → unsigned traffic is accepted (feature off).
            - name: INTERBANK_SIGN_KEY
              valueFrom: { secretKeyRef: { name: banka-interbank-sign, key: sign-key, optional: true } }
          readinessProbe:
            httpGet: { path: /readyz, port: probe }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: probe }
            periodSeconds: 10
          # Requests are the HPA's denominator — without them, the
          # HorizontalPodAutoscaler can't compute a utilization %.
          # No CPU limit on purpose; the workload is bursty HTTP/gRPC
          # fan-out and CPU throttling under load is anti-pattern.
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: raf-banka
spec:
  selector:
    app.kubernetes.io/name: gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway
  namespace: raf-banka
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: banka-3
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway
  minReplicas: 1
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
