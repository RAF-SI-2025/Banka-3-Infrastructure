apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification
  namespace: raf-banka
  labels:
    app.kubernetes.io/name: notification
    app.kubernetes.io/part-of: banka-3
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: notification
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notification
    spec:
      imagePullSecrets:
        - name: harbor-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: notification
          image: registry.urosevicvuk.dev/raf-banka3/notification:main
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          ports:
            - { name: grpc,  containerPort: 50051 }
            - { name: probe, containerPort: 8081 }
          env:
            - { name: GRPC_PORT,  value: "50051" }
            - { name: PROBE_PORT, value: "8081" }
            - { name: LOG_LEVEL,  value: info }
            - { name: LOG_FORMAT, value: json }
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: banka-pg-app, key: uri } }
            - name: SMTP_HOST
              valueFrom: { secretKeyRef: { name: banka-smtp, key: host,     optional: true } }
            - name: SMTP_PORT
              valueFrom: { secretKeyRef: { name: banka-smtp, key: port,     optional: true } }
            - name: SMTP_USERNAME
              valueFrom: { secretKeyRef: { name: banka-smtp, key: username, optional: true } }
            - name: SMTP_PASSWORD
              valueFrom: { secretKeyRef: { name: banka-smtp, key: password, optional: true } }
            - name: SMTP_FROM
              valueFrom: { secretKeyRef: { name: banka-smtp, key: from,     optional: true } }
            - name: SMTP_TLS
              valueFrom: { secretKeyRef: { name: banka-smtp, key: tls,      optional: true } }
          readinessProbe:
            httpGet: { path: /readyz, port: probe }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: probe }
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: notification
  namespace: raf-banka
spec:
  selector:
    app.kubernetes.io/name: notification
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
      appProtocol: grpc
