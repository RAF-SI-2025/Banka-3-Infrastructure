apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  namespace: raf-banka
  labels:
    app.kubernetes.io/name: user
    app.kubernetes.io/part-of: banka-3
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: user
  template:
    metadata:
      labels:
        app.kubernetes.io/name: user
    spec:
      imagePullSecrets:
        - name: harbor-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: user
          image: registry.urosevicvuk.dev/raf-banka3/user:main
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          ports:
            - { name: grpc,   containerPort: 50051 }
            - { name: probe,  containerPort: 8081 }
          env:
            - name: GRPC_PORT
              value: "50051"
            - name: PROBE_PORT
              value: "8081"
            - name: LOG_LEVEL
              value: info
            - name: LOG_FORMAT
              value: json
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: banka-pg-app, key: uri } }
            - name: REDIS_ADDR
              value: redis:6379
            - name: JWT_SIGNING_KEY
              valueFrom: { secretKeyRef: { name: banka-auth, key: jwt-signing-key } }
            - name: JWT_ACCESS_TTL
              value: 15m
            - name: JWT_REFRESH_TTL
              value: 168h
            - name: JWT_MOBILE_REFRESH_TTL
              value: 8760h
            - name: ACTIVATION_TTL
              value: 24h
            - name: RESET_TTL
              value: 15m
            - name: WEB_BASE_URL
              value: https://banka.raf-project.com
            - name: NOTIFICATION_GRPC_ADDR
              value: notification:50051
            - name: SMTP_HOST
              valueFrom: { secretKeyRef: { name: banka-smtp, key: host,     optional: true } }
            - name: SMTP_PORT
              valueFrom: { secretKeyRef: { name: banka-smtp, key: port,     optional: true } }
            - name: SMTP_USERNAME
              valueFrom: { secretKeyRef: { name: banka-smtp, key: username, optional: true } }
            - name: SMTP_PASSWORD
              valueFrom: { secretKeyRef: { name: banka-smtp, key: password, optional: true } }
            - name: SMTP_FROM
              valueFrom: { secretKeyRef: { name: banka-smtp, key: from,     optional: true } }
            - name: SMTP_TLS
              valueFrom: { secretKeyRef: { name: banka-smtp, key: tls,      optional: true } }
          readinessProbe:
            httpGet: { path: /readyz, port: probe }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: probe }
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: user
  namespace: raf-banka
spec:
  selector:
    app.kubernetes.io/name: user
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
      appProtocol: grpc
